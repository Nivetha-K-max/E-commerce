services:
  - type: web
    name: dressshop-backend
    runtime: java
    rootDir: dress-shop/backend
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/dressshop-1.0.0.jar
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SERVER_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
